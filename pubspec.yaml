name: gains_and_guide
description: A new Flutter project for weight training routine management and weekly report.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Database
  sqflite: 2.3.3+2
  path: ^1.8.3
  
  # API & Network
  dio: ^5.4.0
  
  # Charts & UI
  fl_chart: ^0.66.0
  table_calendar: ^3.1.0
  cupertino_icons: ^1.0.2

  flutter_vibrate: ^1.4.0
  
  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  http: ^1.6.0
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1
  path_provider: ^2.1.1
  # 💡 [핵심 수정] 1.3.1 버전을 1.3.0+1 로 변경합니다.
  flutter_background: ^1.3.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.3
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/data/exercises.json