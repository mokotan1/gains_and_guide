# corpus/chunks.jsonl → 임베딩 → Pinecone upsert (수동 실행).
#
# Secrets:
#   PINECONE_API_KEY, PINECONE_INDEX_NAME  (필수)
#   OPENAI_API_KEY                        EMBEDDING_BACKEND 미설정 또는 openai
#   HUGGINGFACE_API_TOKEN                 huggingface 백엔드일 때
# Repository variables (선택, Settings → Secrets and variables → Actions → Variables):
#   EMBEDDING_BACKEND   openai | huggingface
#   PINECONE_NAMESPACE  기본 corpus
#
name: RAG ingest (Pinecone)

on:
  workflow_dispatch:

concurrency:
  group: rag-ingest-pinecone
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend_ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend_ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest_corpus.py --pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          EMBEDDING_BACKEND: ${{ vars.EMBEDDING_BACKEND }}
          PINECONE_NAMESPACE: ${{ vars.PINECONE_NAMESPACE }}
        run: |
          set -euo pipefail
          if [ -z "${PINECONE_API_KEY:-}" ] || [ -z "${PINECONE_INDEX_NAME:-}" ]; then
            echo "::error::Set repository secrets PINECONE_API_KEY and PINECONE_INDEX_NAME"
            exit 1
          fi
          backend="${EMBEDDING_BACKEND:-openai}"
          if [ "$backend" = "huggingface" ]; then
            if [ -z "${HUGGINGFACE_API_TOKEN:-}" ]; then
              echo "::error::Set HUGGINGFACE_API_TOKEN for huggingface backend (or set variable EMBEDDING_BACKEND=openai and OPENAI_API_KEY)"
              exit 1
            fi
          else
            if [ -z "${OPENAI_API_KEY:-}" ]; then
              echo "::error::Set OPENAI_API_KEY for openai embedding backend"
              exit 1
            fi
          fi
          if [ -z "${PINECONE_NAMESPACE:-}" ]; then unset PINECONE_NAMESPACE; fi
          python scripts/ingest_corpus.py --pinecone
