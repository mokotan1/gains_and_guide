# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gains-and-guide-api
    runtime: docker
    dockerfilePath: ./backend_ai/Dockerfile
    dockerContext: ./backend_ai
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_NAMESPACE
        value: corpus
      - key: RAG_BACKEND
        value: auto
      - key: DATABASE_URL
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
